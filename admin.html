<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 - 서울대 동문회</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-page">
  <div class="admin-container">
    <header class="admin-header">
      <h1>관리자</h1>
      <a href="index.html" class="back-link">메인으로</a>
    </header>

    <section class="admin-section">
      <h2>행사 정보 설정</h2>
      <p class="section-desc">event_settings(id=1)의 행사 일시, 장소, 네이버 지도 URL을 수정합니다.</p>
      <form id="location-form">
        <div class="form-group">
          <label for="datetime-input">행사 일시 텍스트</label>
          <input type="text" id="datetime-input" placeholder="예: 2026년 5월 12일 18:00" required>
        </div>
        <div class="form-group">
          <label for="location-input">장소명</label>
          <input type="text" id="location-input" placeholder="예: 여의도" required>
        </div>
        <div class="form-group">
          <label for="map-url-input">네이버 지도 URL</label>
          <input type="text" id="map-url-input" placeholder="https://map.naver.com/v5/search/...">
        </div>
        <button type="submit" class="btn btn-primary">설정 저장</button>
      </form>
      <p id="location-status" class="status-msg"></p>
    </section>

    <section class="admin-section">
      <h2>참석자 목록</h2>
      <div class="attendees-table-wrap">
        <table class="attendees-table">
          <thead>
            <tr>
              <th>성함</th>
              <th>학번</th>
              <th>학과</th>
              <th>참석</th>
              <th>등록일</th>
            </tr>
          </thead>
          <tbody id="attendees-body">
            <tr><td colspan="5" class="loading">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="admin.js"></script>
</body>
</html>
