<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#003366">
    <title>서울대학교 동문회 참석 신청</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <!-- 로고: 이미지 파일은 images/snu-logo.png 에 넣거나, 아래 src를 웹 주소로 바꾸세요 -->
                <img src="images/snu-logo.png" alt="서울대학교" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="logo-fallback">서울대학교</div>
            </div>
            <h1>동문회 참석 신청</h1>
        </header>

        <main class="main">
            <section class="event-info">
                <div class="info-card">
                    <span class="info-label">일시</span>
                    <span class="info-value">2026년 5월 12일</span>
                </div>
                <div class="info-card">
                    <span class="info-label">장소</span>
                    <span class="info-value" id="eventLocation">여의도 (상세 주소는 곧 안내됩니다)</span>
                    <a href="#" id="mapLink" class="map-link" target="_blank" rel="noopener" style="display: none;">지도 보기</a>
                    <div id="locationMap" class="location-map" style="display: none;"></div>
                </div>
            </section>

            <form id="attendanceForm" class="form">
                <div class="form-group">
                    <label for="attendance">참석 여부 <span class="required">*</span></label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="attendance" value="참석" required>
                            <span class="radio-label">참석합니다</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="attendance" value="불참">
                            <span class="radio-label">불참합니다</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="studentId">학번 <span class="required">*</span></label>
                    <input type="text" id="studentId" name="studentId" placeholder="예: 2009" required maxlength="20">
                </div>

                <div class="form-group">
                    <label for="department">학과 <span class="required">*</span></label>
                    <input type="text" id="department" name="department" placeholder="예: 컴퓨터공학과" required maxlength="50">
                </div>

                <div class="form-group">
                    <label for="name">성함 <span class="required">*</span></label>
                    <input type="text" id="name" name="name" placeholder="홍길동" required maxlength="30">
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">참석 신청하기</span>
                    <span class="btn-loading" style="display: none;">처리 중...</span>
                </button>
            </form>

            <div id="successMessage" class="success-message" style="display: none;">
                <span class="success-icon">✓</span>
                <p>참석 신청이 완료되었습니다.</p>
                <p class="success-sub">감사합니다.</p>
            </div>
        </main>

        <footer class="footer">
            <a href="admin.html" class="admin-link">관리자</a>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
